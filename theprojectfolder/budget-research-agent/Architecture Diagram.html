<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Research Agent — Architecture Diagram</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100vw;
        height: 100vh;
        background: #eef1f8;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "IBM Plex Sans", sans-serif;
      }
      .scale-wrapper {
        width: 1100px;
        height: 720px;
        transform-origin: center center;
        flex-shrink: 0;
      }
      .canvas {
        width: 1100px;
        height: 720px;
        background: #ffffff;
        border: 1.5px solid rgba(44, 70, 151, 0.14);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 2px 24px rgba(44, 70, 151, 0.08);
      }
      .canvas::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #2c4697, #4a6cd4, #2c4697);
        border-radius: 14px 14px 0 0;
        z-index: 10;
      }
      .canvas::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #2c4697, #4a6cd4, #2c4697);
        border-radius: 0 0 14px 14px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="scale-wrapper" id="sw">
      <div class="canvas">
